<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>ApexStock Chart</title>

    <style>
      body {
        transition: background-color 0.15s ease;
        padding: 20px;
      }
      body.dark-mode {
        background-color: #343a3f;
        color: #f8f9fa;
      }
      #chart-container {
        max-width: calc(100% - 20px);
        margin: 35px auto;
        position: relative;
      }
      #theme-toggle {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 8px 16px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        transition: background-color 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #theme-toggle:hover {
        background-color: #45a049;
      }
      body.dark-mode #theme-toggle {
        background-color: #f39c12;
      }
      body.dark-mode #theme-toggle:hover {
        background-color: #e67e22;
      }
      #theme-toggle svg {
        width: 18px;
        height: 18px;
      }
    </style>

    <script src="../../apexcharts-js/dist/apexcharts.js"></script>
    <script src="../dist/apexstock.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.8.17/dayjs.min.js"></script>

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42;
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647;
        return (_seed - 1) / 2147483646;
      };
    </script>
  </head>

  <body>
    <button id="theme-toggle" aria-label="Toggle Dark Mode">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>

    <div id="chart-container">
      <div id="chart" style="position: relative"></div>
    </div>

    <script>
      function generateOHLCData(count) {
        const data = [];
        let baseDate = new Date("2022-01-01").getTime();
        let price = 100;
        const volMin = 6000;
        const volMax = 900000;
        let i = 0;

        while (data.length < count) {
          const currentDate = new Date(baseDate + i * 86400000); // Add one day in milliseconds
          const dayOfWeek = currentDate.getDay(); // 0 is Sunday, 6 is Saturday

          // Skip weekends (Saturday and Sunday)
          if (dayOfWeek !== 0 && dayOfWeek !== 6) {
            // Generate random OHLC values
            const change = (Math.random() - 0.5) * 5;
            const open = price;
            const close = price + change;
            const high = Math.max(open, close) + Math.random() * 2;
            const low = Math.min(open, close) - Math.random() * 2;

            // Add datapoint
            data.push({
              x: new Date(currentDate).toString(),
              y: [
                Number(open.toFixed(2)),
                Number(high.toFixed(2)),
                Number(low.toFixed(2)),
                Number(close.toFixed(2)),
              ],
              v: Math.floor(Math.random() * (volMax - volMin + 1)) + volMin,
            });

            // Update base price for next datapoint
            price = close;
          }

          i++; // Move to next day regardless of whether it's a weekend
        }

        return data;
      }
      // Initialize sample data
      const sampleData = generateOHLCData(250);

      const chartOptions = {
        chart: {
          height: 400,
          // additional ApexCharts settings
        },
        series: [
          {
            data: sampleData,
          },
        ],
        plotOptions: {},
        xaxis: {
          type: "category",
          labels: {
            formatter: function (val) {
              return dayjs(val).format("MMM DD HH:mm");
            },
          },
        },
        yaxis: {
          tooltip: {
            enabled: true,
          },
        },
        theme: {
          mode: "light",
        },
      };

      let isDarkMode = false;
      const stockChart = new ApexStock(
        document.querySelector("#chart"),
        chartOptions
      );
      stockChart.render();

      // Theme toggle functionality
      document
        .getElementById("theme-toggle")
        .addEventListener("click", function () {
          isDarkMode = !isDarkMode;

          // Toggle body class for general styling
          document.body.classList.toggle("dark-mode");

          // Update chart theme
          stockChart.update({
            theme: {
              mode: isDarkMode ? "dark" : "light",
            },
          });

          // Update SVG icon
          this.innerHTML = "";

          // Create SVG element
          const svg = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "svg"
          );
          svg.setAttribute("width", "24");
          svg.setAttribute("height", "24");
          svg.setAttribute("viewBox", "0 0 24 24");
          svg.setAttribute("fill", "none");
          svg.setAttribute("stroke", "currentColor");
          svg.setAttribute("stroke-width", "2");
          svg.setAttribute("stroke-linecap", "round");
          svg.setAttribute("stroke-linejoin", "round");

          if (isDarkMode) {
            // Sun icon for light mode toggle
            const sunPath = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "path"
            );
            sunPath.setAttribute(
              "d",
              "M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
            );

            const circle = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "circle"
            );
            circle.setAttribute("cx", "12");
            circle.setAttribute("cy", "12");
            circle.setAttribute("r", "5");

            svg.appendChild(sunPath);
            svg.appendChild(circle);
          } else {
            // Moon icon for dark mode toggle
            const moonPath = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "path"
            );
            moonPath.setAttribute(
              "d",
              "M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
            );

            svg.appendChild(moonPath);
          }

          // Add a title for accessibility
          const title = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "title"
          );
          title.textContent = isDarkMode
            ? "Toggle Light Mode"
            : "Toggle Dark Mode";
          svg.appendChild(title);

          // Append the SVG to the button
          this.appendChild(svg);

          // Update aria-label as well
          this.setAttribute(
            "aria-label",
            isDarkMode ? "Toggle Light Mode" : "Toggle Dark Mode"
          );
        });
    </script>
  </body>
</html>

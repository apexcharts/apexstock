<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CandleStick Chart</title>

    <style>
      #chart-container {
        max-width: 1050px;
        margin: 35px auto;
        position: relative;
      }

      /* dropdown css */

      /* Custom dropdown wrapper */
      .apexstock-custom-select-wrapper {
        position: relative;
        width: 200px;
        font-family: Arial, sans-serif;
        user-select: none;
        box-sizing: border-box;
        font-size: 14px;
      }
      .apexstock-custom-select-wrapper * {
        box-sizing: border-box;
      }
      .apexstock-custom-select-trigger {
        position: relative;
        display: block;
        width: 100%;
        padding: 8px;
        background: #fff;
        border: 1px solid #ccc;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .apexstock-custom-select-trigger:after {
        content: "▼";
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 12px;
        color: #999;
      }
      .apexstock-custom-options {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: #fff;
        border: 1px solid #ccc;
        border-top: none;
        z-index: 999;
        max-height: 200px;
        overflow-y: auto;
        display: none;
      }
      .apexstock-custom-option {
        padding: 10px;
        cursor: pointer;
      }
      .apexstock-custom-option:hover {
        background: #f2f2f2;
      }
      .apexstock-custom-option.selected {
        background: #e6f7ff;
      }
      .apexstock-custom-option.selected:before {
        content: "✔";
        margin-right: 5px;
        color: #00aaff;
      }

      /* Overlay wrapper for drawing (positioned on top of the chart) */
      .apexstock-drawing-overlay-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      /* SVG overlay for drawing */
      .apexstock-drawing-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      /* Drawing toolbar container (positioned beside the chart) */
      .apexstock-drawing-toolbar {
        position: absolute;
        top: 0px;
        left: 220px;
        z-index: 11;
        background: #fff;
        border-radius: 3px;
        padding: 5px;
        display: flex;
        align-items: center;
      }

      /* Buttons in the drawing toolbar */
      .apexstock-drawing-tool {
        width: 24px;
        height: 24px;
        margin: 0 2px;
        cursor: pointer;
        background: transparent;
        border: 1px solid #ddd;
        border-radius: 3px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }

      .apexstock-drawing-color-picker {
        width: 24px;
        height: 24px;
        border: none;
        padding: 0;
        margin-right: 5px;
        cursor: pointer;
      }

      .apexstock-drawing-tool.active {
        background: #f0f0f0;
        box-shadow: inset 0 0 3px rgba(0, 0, 0, 0.2);
      }
    </style>

    <script src="../../apexcharts-js/dist/apexcharts.js"></script>
    <script src="../dist/apexstock.min.js"></script>

    <script>
      // Replace Math.random() with a pseudo-random number generator to get reproducible results in e2e tests
      // Based on https://gist.github.com/blixt/f17b47c62508be59987b
      var _seed = 42;
      Math.random = function () {
        _seed = (_seed * 16807) % 2147483647;
        return (_seed - 1) / 2147483646;
      };
    </script>
  </head>

  <body>
    <div id="chart-container">
      <div id="chart" style="position: relative"></div>
    </div>

    <script>
      function generateOHLCData(count) {
        const data = [];
        let baseDate = new Date("2022-01-01").getTime();
        let price = 100;
        const volMin = 6000;
        const volmax = 900000;

        for (let i = 0; i < count; i++) {
          const date = baseDate + i * 86400000; // Add one day in milliseconds

          // Generate random OHLC values
          const change = (Math.random() - 0.5) * 5;
          const open = price;
          const close = price + change;
          const high = Math.max(open, close) + Math.random() * 2;
          const low = Math.min(open, close) - Math.random() * 2;

          // Add datapoint
          data.push({
            x: new Date(date),
            y: [
              Number(open.toFixed(2)),
              Number(high.toFixed(2)),
              Number(low.toFixed(2)),
              Number(close.toFixed(2)),
            ],
            v: Math.floor(Math.random() * (volmax - volMin + 1)) + volMin,
          });

          // Update base price for next datapoint
          price = close;
        }

        return data;
      }

      // Initialize sample data
      const sampleData = generateOHLCData(250);

      const chartOptions = {
        chart: {
          height: 400,
          // additional ApexCharts settings
        },
        series: [
          {
            data: sampleData,
          },
        ],
        plotOptions: {},
        xaxis: {
          type: "datetime",
        },
        yaxis: {
          tooltip: {
            enabled: true,
          },
        },
      };

      const stockChart = new ApexStock(
        document.querySelector("#chart"),
        chartOptions
      );
      stockChart.render();
    </script>
  </body>
</html>

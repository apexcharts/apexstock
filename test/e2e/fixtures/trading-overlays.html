<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApexStock Trading Overlays Fixture</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 16px;
        background: #fff;
      }
      #chart-container {
        width: 900px;
        background: #fff;
      }
    </style>
    <script src="/apexcharts-js/dist/apexcharts.js"></script>
    <script src="/apexstock/dist/apexstock.min.js"></script>
  </head>
  <body>
    <div id="chart-container"><div id="chart"></div></div>

    <script>
      function generateData(count) {
        const data = [];
        const base = Date.UTC(2024, 0, 1);
        let last = 100;
        for (let i = 0; i < count; i++) {
          let n = Math.sin(i * 12.9898) * 43758.5453;
          n = n - Math.floor(n);
          const o = last;
          const c = +(o + (n - 0.5) * 4).toFixed(2);
          const h = +(Math.max(o, c) + n * 2).toFixed(2);
          const l = +(Math.min(o, c) - n * 2).toFixed(2);
          data.push({ x: base + i * 86400000, y: [o, h, l, c], v: Math.floor(n * 1e6) });
          last = c;
        }
        return data;
      }

      window.__ready = false;
      document.addEventListener("DOMContentLoaded", function () {
        const chart = new ApexStock(document.querySelector("#chart"), {
          chart: { height: 460, animations: { enabled: false }, redrawOnParentResize: false },
          theme: { mode: "light" },
          series: [{ name: "Price", data: generateData(120) }],
        });
        chart.render();
        window.__chart = chart;

        // Place lines centrally within the rendered y-range so they stay in view
        // (annotations outside the visible y-range are clipped and not drawn),
        // including after a Heikin-Ashi switch which narrows the range.
        const g = chart.chart.w.globals;
        const lo = g.minY;
        const hi = g.maxY;
        const at = (f) => +(lo + (hi - lo) * f).toFixed(2);
        chart.addOrderLine({ id: "buy", price: at(0.4), side: "buy", label: "Buy" });
        chart.addOrderLine({ id: "sell", price: at(0.6), side: "sell", label: "Sell" });
        chart.addStopLoss({ id: "sl", price: at(0.35), label: "SL" });
        chart.addTakeProfit({ id: "tp", price: at(0.65), label: "TP" });
        chart.addAlert({ id: "alert", price: at(0.5), label: "Alert" });

        requestAnimationFrame(() =>
          requestAnimationFrame(() => (window.__ready = true))
        );
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApexStock Streaming (appendData) Fixture</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 16px;
        background: #fff;
      }
      #chart-container {
        width: 900px;
        background: #fff;
      }
      /* Hidden baseline chart used only for the update()-per-tick perf compare. */
      #baseline-container {
        position: absolute;
        left: -10000px;
        top: 0;
        width: 900px;
      }
    </style>
    <script src="/apexcharts-js/dist/apexcharts.js"></script>
    <script src="/apexstock/dist/apexstock.min.js"></script>
  </head>
  <body>
    <div id="chart-container"><div id="chart"></div></div>
    <div id="baseline-container"><div id="baseline"></div></div>

    <script>
      // Deterministic OHLCV generator (no Math.random) so runs are reproducible.
      const DAY = 86400000;
      const BASE = Date.UTC(2024, 0, 1);
      function gen(count, startPrice) {
        const data = [];
        let last = startPrice;
        for (let i = 0; i < count; i++) {
          let n = Math.sin(i * 12.9898 + 1) * 43758.5453;
          n = n - Math.floor(n);
          const o = last;
          const c = +(o + (n - 0.5) * 4).toFixed(2);
          const h = +(Math.max(o, c) + n * 2).toFixed(2);
          const l = +(Math.min(o, c) - n * 2).toFixed(2);
          data.push({ x: BASE + i * DAY, y: [o, h, l, c], v: Math.floor(n * 1e6) + 1 });
          last = c;
        }
        return data;
      }

      // The next bar after index `i` (continues the same deterministic stream).
      function nextBar(i, prevClose) {
        let n = Math.sin(i * 12.9898 + 1) * 43758.5453;
        n = n - Math.floor(n);
        const o = prevClose;
        const c = +(o + (n - 0.5) * 4).toFixed(2);
        const h = +(Math.max(o, c) + n * 2).toFixed(2);
        const l = +(Math.min(o, c) - n * 2).toFixed(2);
        return { x: BASE + i * DAY, y: [o, h, l, c], v: Math.floor(n * 1e6) + 1 };
      }

      function makeChart(el, data) {
        const chart = new ApexStock(el, {
          chart: { height: 420, animations: { enabled: false }, redrawOnParentResize: false },
          theme: { mode: "light" },
          series: [{ name: "Price", data }],
        });
        chart.render();
        // Exercise an overlay (line), a rangeArea overlay, and an oscillator pane.
        chart.updateIndicator("moving average");
        chart.updateIndicator("bollinger bands");
        chart.updateIndicator("rsi");
        return chart;
      }

      const BASE_COUNT = 300;

      window.__ready = false;
      document.addEventListener("DOMContentLoaded", function () {
        const chart = makeChart(document.querySelector("#chart"), gen(BASE_COUNT, 100));
        window.__chart = chart;
        window.__baseCount = BASE_COUNT;

        // Snapshot the oscillator pane instance so a test can prove appendData
        // does NOT destroy/recreate it.
        window.__rsiPaneRef = chart.indicatorChartMap["rsi"];

        // Append `n` bars one at a time via appendData(follow). Returns elapsed ms.
        window.__appendLoop = function (n) {
          const t0 = performance.now();
          for (let k = 0; k < n; k++) {
            const i = chart.series.length;
            const prev = chart.series[chart.series.length - 1].y[3];
            chart.appendData(nextBar(i, prev), { view: "follow" });
          }
          return performance.now() - t0;
        };

        // Baseline: the OLD way. Rebuild the whole series + indicators every tick
        // via update(). Runs on a hidden chart so it never disturbs the visible one.
        window.__updateLoop = function (n) {
          const base = makeChart(document.querySelector("#baseline"), gen(BASE_COUNT, 100));
          const growing = base.series.slice();
          const t0 = performance.now();
          for (let k = 0; k < n; k++) {
            const i = growing.length;
            const prev = growing[growing.length - 1].y[3];
            growing.push(nextBar(i, prev));
            base.update({ series: [{ name: "Price", data: growing.slice() }] });
          }
          const ms = performance.now() - t0;
          base.destroy && base.destroy();
          return ms;
        };

        // Read the rendered tails for correctness assertions.
        window.__readState = function () {
          const main = chart.chart.w.config.series;
          const price = main.find((s) => s.name === "Price").data;
          const ma = main.find((s) => s.name === "Moving Average").data;
          const bb = main.find((s) => s.name === "Bollinger Bands").data;
          const rsiPane = chart.indicatorChartMap["rsi"];
          const rsi = rsiPane.w.config.series.find((s) => s.name === "RSI").data;
          return {
            candleCount: price.length,
            seriesCount: chart.series.length,
            maLen: ma.length,
            bbLen: bb.length,
            rsiLen: rsi.length,
            lastMA: ma[ma.length - 1].y,
            lastBB: bb[bb.length - 1].y, // [lower, upper]
            lastRSI: rsi[rsi.length - 1].y,
            rsiPaneSame: chart.indicatorChartMap["rsi"] === window.__rsiPaneRef,
          };
        };

        requestAnimationFrame(() =>
          requestAnimationFrame(() => (window.__ready = true))
        );
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApexStock E2E Fixture</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 16px;
        background: #ffffff;
      }
      #chart-container {
        width: 900px;
        background: #fff;
      }
    </style>
    <!-- Root-absolute paths: the e2e server root is the parent Work/apexcharts
         dir, so these resolve regardless of this file's depth. -->
    <script src="/apexcharts-js/dist/apexcharts.js"></script>
    <script src="/apexstock/dist/apexstock.min.js"></script>
  </head>
  <body>
    <div id="chart-container"><div id="chart"></div></div>

    <script>
      // Deterministic OHLC data (no Math.random) so visual snapshots are stable.
      function generateData(count) {
        const data = [];
        const base = Date.UTC(2024, 0, 1);
        let last = 100;
        for (let i = 0; i < count; i++) {
          let n = Math.sin(i * 12.9898) * 43758.5453;
          n = n - Math.floor(n); // fractional part -> deterministic 0..1
          const o = last;
          const c = +(o + (n - 0.5) * 4).toFixed(2);
          const h = +(Math.max(o, c) + n * 2).toFixed(2);
          const l = +(Math.min(o, c) - n * 2).toFixed(2);
          data.push({
            x: base + i * 86400000,
            y: [o, h, l, c],
            v: Math.floor(n * 1e6),
          });
          last = c;
        }
        return data;
      }

      window.__ready = false;
      document.addEventListener("DOMContentLoaded", function () {
        const chart = new ApexStock(document.querySelector("#chart"), {
          chart: {
            height: 460,
            // Animations OFF -> deterministic render for screenshot diffing.
            animations: { enabled: false },
            redrawOnParentResize: false,
          },
          theme: { mode: "light" },
          series: [{ name: "Price", data: generateData(120) }],
        });
        chart.render();
        window.__chart = chart;
        // Flag readiness once the first SVG has painted.
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            window.__ready = true;
          });
        });
      });
    </script>
  </body>
</html>

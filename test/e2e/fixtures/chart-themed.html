<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApexStock E2E Fixture — custom theme</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 16px;
        background: #ffffff;
      }
      #chart-container {
        width: 900px;
      }

      /* Custom "amber" theme via the documented override recipe only — no fork.
         An identifiable accent + background so a computed-style assertion can
         confirm the tokens actually reached the rendered controls. */
      .apexstock-theme-light [class^="apexstock-"] {
        --apexstock-light-bg: #fffdf7;
        --apexstock-light-border: #e7d9b8;
        --apexstock-light-text: #5a3e1b;
        --apexstock-light-hover: #fbeecb;
      }
      .apexstock-theme-light [class^="apexstock-"],
      .apexstock-theme-dark [class^="apexstock-"] {
        --apexstock-blue: rgb(217, 138, 9);
        --apexstock-border-radius-md: 11px;
      }
    </style>
    <script src="/apexcharts-js/dist/apexcharts.js"></script>
    <script src="/apexstock/dist/apexstock.min.js"></script>
  </head>
  <body>
    <div id="chart-container"><div id="chart"></div></div>
    <script>
      function generateData(count) {
        const data = [];
        const base = Date.UTC(2024, 0, 1);
        let last = 100;
        for (let i = 0; i < count; i++) {
          let n = Math.sin(i * 12.9898) * 43758.5453;
          n = n - Math.floor(n);
          const o = last;
          const c = +(o + (n - 0.5) * 4).toFixed(2);
          const h = +(Math.max(o, c) + n * 2).toFixed(2);
          const l = +(Math.min(o, c) - n * 2).toFixed(2);
          data.push({ x: base + i * 86400000, y: [o, h, l, c] });
          last = c;
        }
        return data;
      }
      window.__ready = false;
      document.addEventListener("DOMContentLoaded", function () {
        const chart = new ApexStock(document.querySelector("#chart"), {
          chart: { height: 460, animations: { enabled: false } },
          theme: { mode: "light" },
          series: [{ name: "Price", data: generateData(120) }],
        });
        chart.render();
        window.__chart = chart;
        requestAnimationFrame(() =>
          requestAnimationFrame(() => (window.__ready = true))
        );
      });
    </script>
  </body>
</html>
